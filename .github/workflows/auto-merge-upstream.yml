name: Auto Merge Upstream

on:
  schedule:
    - cron: '45 7 * * *'  # Daily at 07:45 UTC (15min before clove's 08:00)
  workflow_dispatch:  # Manual trigger

permissions:
  contents: write
  issues: write

jobs:
  merge-clove-front:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add upstream and attempt merge
        id: merge
        run: |
          git remote add upstream https://github.com/Huan-zhaojun/clove-front.git
          git fetch upstream master

          if git merge-base --is-ancestor upstream/master HEAD; then
            echo "Already up to date"
            echo "updated=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git merge upstream/master --no-edit; then
            echo "updated=true" >> "$GITHUB_OUTPUT"
          else
            git merge --abort
            echo "updated=conflict" >> "$GITHUB_OUTPUT"
          fi

      - name: Push changes
        if: steps.merge.outputs.updated == 'true'
        run: git push origin master

      - name: Create issue on conflict
        if: steps.merge.outputs.updated == 'conflict'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: 'Cognitohazard',
              repo: 'clove-front',
              title: '⚠️ clove-front upstream merge has conflicts',
              body: 'Automatic merge of `Huan-zhaojun/clove-front` into `Cognitohazard/clove-front` failed due to conflicts. Please merge manually.',
              labels: ['upstream-sync']
            });
